<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contactez Eloan Delbroeuve via ce formulaire.">
    <title>Contact — Portfolio</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="../index.html" class="nav-brand">
            <span class="nav-brand-mark" aria-hidden="true">ED</span>
            <span class="nav-brand-name">Eloan</span>
        </a>
        <ul>
            <li><a href="../index.html">Accueil</a></li>
            <li><a href="experience.html">Expériences</a></li>
            <li><a href="form.html" class="active">Contact</a></li>
        </ul>
        <button class="theme" type="button">Mode sombre</button>
    </nav>

    <h1 class="titre_1">Contact</h1>

    <main class="contact-wrapper reveal">
        <section class="contact-card">
            <p class="contact-description">Remplissez le formulaire ci-dessous pour m'envoyer un message.</p>
            <div id="contact-status" class="contact-status" hidden></div>

            <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="fed97b4e-ac6f-42e2-b1a7-8854365c6805">

                <div class="contact-form-row">
                    <div>
                        <label for="name">Nom</label>
                        <input id="name" type="text" name="name" maxlength="100" required>
                    </div>

                    <div>
                        <label for="email">Email</label>
                        <input id="email" type="email" name="email" maxlength="190" required>
                    </div>
                </div>

                <div>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" maxlength="1000" required></textarea>
                    <p id="message-counter" class="char-counter"></p>
                </div>

                <div class="contact-form-actions">
                    <button class="contact-submit" type="submit">
                        <i class="fas fa-paper-plane" style="margin-right:8px"></i>Envoyer
                    </button>
                </div>
            </form>
        </section>
    </main>

    <footer>
        <div class="footer-inner">
            <div class="footer-links">
                <a href="https://www.linkedin.com/in/eloan-delbroeuve/" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-linkedin"></i> LinkedIn
                </a>
                <a href="https://github.com/N4ole" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-github"></i> GitHub personnel
                </a>
                <a href="https://github.com/Eloan-Supinfo" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-github"></i> GitHub Supinfo
                </a>
                <a href="mailto:eloandb@icloud.com">
                    <i class="fas fa-envelope"></i> Email
                </a>
            </div>
            <p class="footer-copy">&copy; 2026 Eloan Delbroeuve. Tous droits réservés.</p>
        </div>
    </footer>

    <script src="../js/script.js"></script>
    <script>
        (function () {
            const statusBox = document.getElementById("contact-status");
            const params = new URLSearchParams(window.location.search);
            const status = params.get("status");

            if (!statusBox || !status) return;

            const map = {
                success:          { css: "success", text: "Message envoyé avec succès. Merci pour votre contact." },
                validation_error: { css: "error",   text: "Vérifiez les champs du formulaire puis réessayez." },
                db_error:         { css: "error",   text: "Erreur lors de l'enregistrement en base de données." },
                mail_error:       { css: "error",   text: "Impossible d'envoyer l'email pour le moment." },
                server_error:     { css: "error",   text: "Une erreur serveur est survenue." }
            };

            const item = map[status];
            if (!item) return;

            statusBox.hidden = false;
            statusBox.classList.add(item.css);
            statusBox.textContent = item.text;
        })();
    </script>
</body>
</html>
